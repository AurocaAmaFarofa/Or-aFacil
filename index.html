<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrçaFácil</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
    />
  </head>
  <body>
    <main class="app">
      <header>
        <h1 class="app-header-title">OrçaFácil</h1>
      </header>
      <div class="sections-container">
        <!-- Cadastrar Preços -->
        <section id="cadastrar-precos" class="sections-app-main">
          <h2 class="form-title">Cadastrar preço</h2>
          <form class="formulario" novalidate>
            <div class="form-group">
              <label for="nome-material">Nome</label>
              <input
                type="text"
                id="nome-material"
                placeholder="Ex: Madeira, Tela..."
                required
                name="nome-material"
              />
              <span class="error-mensagem">
                Por favor, insira o nome do material
              </span>
            </div>

            <div class="form-group">
              <label for="valor-input">Valor</label>
              <input
                type="number"
                id="valor-input"
                placeholder="Ex: 55, 19.50"
                required
                name="valor-input"
              />
              <span class="error-mensagem"> Por favor, insira o valor </span>
            </div>

            <button type="submit" id="btn-submit-material">Salvar</button>
          </form>
        </section>

        <!-- selecionar quantidades -->
        <section id="selecionar-quantidade" class="sections-app-main">
          <h2>Selecionar itens</h2>
          <form class="formulario" novalidate>
            <div class="form-group">
              <label for="selecionar-item">Selecionar itens</label>
              <select name="selecionar-item" id="selecionar-item" required>
                <option value="" disabled selected class="opcao-inicial">
                  Escolha uma opção
                </option>
              </select>
            </div>

            <div class="form-group">
              <label for="quantidade-itens">Quantia</label>
              <input
                type="number"
                id="quantidade-itens"
                placeholder="Ex: 1, 2, 3..."
                required
                name="quantidade-itens"
              />
            </div>

            <button type="submit" id="btn-submit-add">Adicionar</button>
          </form>
        </section>

        <!-- Tabela de itens adicionados -->
        <section class="sections-app-main">
          <div class="table-container">
            <table>
              <caption>
                Tabela de preços
              </caption>
              <thead>
                <tr>
                  <th scope="col">Nome</th>
                  <th scope="col">Quantidade</th>
                  <th scope="col">Preço</th>
                  <th scope="col">Subtotal</th>
                  <th scope="col">X</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
          <div class="valor-final">
            <h2 class="text-valor">
              Valor total: <strong id="valor-total">0,00</strong>
            </h2>
            <button>Imprimir</button>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
