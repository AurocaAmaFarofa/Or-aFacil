<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrçaFácil</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
    />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="app">
      <!-- MODAIS DE POPUP -->
      <section id="popup-modal" class="popup-modal">
        <div class="popup-backdrop" id="popup-backdrop"></div>
        <div class="popup-card" role="status">
          <div class="popup-progress" aria-hidden="true"></div>
          <div id="popup-modal-text" class="popup-content">Modal teste</div>
        </div>
      </section>

      <!-- Modal adicionar categoria -->

      <section id="adicionar-categoria" class="confirmar-exclusao">
        <div class="confirmar-backdrop"></div>
        <div class="confirmar-card">
          <div class="modal-editar-header">
            <h1 class="materiais-titulo">Nova Categoria</h1>
            <button onclick="fecharModalCategoria()">X</button>
          </div>

          <form class="formulario">
            <div class="form-group">
              <label for="nome-nova-categoria">Nome da Categoria</label>
              <input
                type="text"
                id="nome-nova-categoria"
                placeholder="Ex: Madeiras, Telas..."
                required
                name="nome-nova-categoria"
              />
              <span class="error-mensagem" id="erro-categoria-nome"></span>
            </div>
          </form>
          <button onclick="addNovaCategoria()">Adicionar Categoria</button>
        </div>
      </section>

      <section id="confirmar-exclusao" class="confirmar-exclusao">
        <div class="confirmar-backdrop"></div>
        <div class="confirmar-card">
          <p>Deseja mesmo excluir?</p>
          <div class="confirmar-botoes">
            <button id="btn-confirmar-excluir" type="button">Sim</button>
            <button id="btn-cancelar-excluir" type="button">Não</button>
          </div>
        </div>
      </section>

      <section id="editar-material" class="confirmar-exclusao">
        <div class="confirmar-backdrop"></div>
        <div class="confirmar-card">
          <div class="modal-editar-header">
            <h1 class="materiais-titulo">Editar Material</h1>
            <button onclick="fecharModalEdicao()">X</button>
          </div>

          <form class="formulario" novalidate>
            <div class="form-group">
              <label for="editar-nome-material">Nome</label>
              <input
                type="text"
                id="editar-nome-material"
                placeholder="Ex: Madeira, Tela..."
                required
                name="editar-nome-material"
              />
              <span class="error-mensagem" id="editar-erro-material"></span>
            </div>

            <div class="form-group">
              <label for="editar-valor-material">Valor</label>
              <input
                type="number"
                id="editar-valor-material"
                placeholder="Ex: 55, 19.50"
                required
                name="editar-valor-material"
              />
              <span class="error-mensagem" id="editar-erro-valor"></span>
            </div>

            <div class="form-group">
              <label for="editar-selecionar-medida">Unidade de Medida</label>
              <select
                name="editar-selecionar-medida"
                id="editar-selecionar-medida"
                required
              >
                <option value="" disabled selected class="opcao-inicial">
                  Selecionar Medida
                </option>
                <option value="unidade">Unidades</option>
                <option value="hora">Horas</option>
                <option value="metros">Metros</option>
                <option value="quilos">Quilos</option>
              </select>
              <span
                class="error-mensagem"
                id="editar-erro-medida-material"
              ></span>
            </div>

            <div class="form-group">
              <label for="editar-selecionar-categoria">Categoria</label>
              <select
                name="editar-selecionar-categoria"
                id="editar-selecionar-categoria"
              >
                <option value="" disabled selected class="opcao-inicial">
                  Selecionar Categoria
                </option>
              </select>
              <span class="error-mensagem" id="editar-erro-categoria"></span>
            </div>
          </form>

          <button onclick="salvarEdicao()">Salvar</button>
        </div>
      </section>
      <!-- Fim modais -->

      <header class="header-main-app">
        <div class="header-section">
          <h1 class="app-header-title">OrçaFácil</h1>
          <button id="excluir-local-storage">Excluir Tudo</button>
        </div>
        <div class="header-section-spa">
          <button onclick="mostrarPagina('main')">Orçamentos</button>
          <button onclick="mostrarPagina('materiais')">Materiais</button>
          <button onclick="mostrarPagina('categorias')">Categorias</button>
        </div>
      </header>

      <!-- SEÇÃO PRINCIPAL DO APP -->
      <section class="containers-app pagina ativa" id="main-page">
        <div class="sections-container">
          <!-- Cadastrar Preços -->
          <section id="cadastrar-precos" class="sections-app-main">
            <h2 class="form-title">Cadastrar preço</h2>
            <form class="formulario" id="formulario-material" novalidate>
              <div class="form-group">
                <label for="nome-material">Nome</label>
                <input
                  type="text"
                  id="nome-material"
                  placeholder="Ex: Madeira, Tela..."
                  required
                  name="nome-material"
                />
                <span class="error-mensagem" id="erro-material"> </span>
              </div>

              <div class="form-group">
                <label for="valor-input">Valor</label>
                <input
                  type="number"
                  id="valor-input"
                  placeholder="Ex: 55, 19.50"
                  required
                  name="valor-input"
                />
                <span class="error-mensagem" id="valor-material-erro"> </span>
              </div>

              <div class="form-group">
                <label for="selecionar-medida">Unidade de Medida</label>
                <select
                  name="selecionar-medida"
                  id="selecionar-medida"
                  required
                >
                  <option value="" disabled selected class="opcao-inicial">
                    Selecionar Medida
                  </option>
                  <option value="unidade">Unidades</option>
                  <option value="hora">Horas</option>
                  <option value="metros">Metros</option>
                  <option value="quilos">Quilos</option>
                </select>
                <span class="error-mensagem" id="erro-medida-material"></span>
              </div>

              <div class="form-group">
                <label for="selecionar-categoria">Categoria</label>
                <div class="selecionar-categoria-inner">
                  <select name="selecionar-categoria" id="selecionar-categoria">
                    <option value="" disabled selected class="opcao-inicial">
                      Selecionar Categoria
                    </option>
                  </select>
                  <span
                    class="error-mensagem"
                    id="erro-selecionar-categoria"
                  ></span>

                  <button
                    type="button"
                    id="btn-criar-nova-categoria"
                    onclick="abrirModalCategoria()"
                  >
                    Nova Categoria
                  </button>
                </div>
              </div>

              <hr class="divisoria" />

              <button type="submit" id="btn-submit-material">Salvar</button>
            </form>
          </section>

          <!-- selecionar quantidades -->
          <section id="selecionar-quantidade" class="sections-app-main">
            <h2>Selecionar itens</h2>
            <form class="formulario" novalidate id="selecionar-quantias">
              <div class="form-group">
                <label for="selecionar-item">Selecionar itens</label>
                <select name="selecionar-item" id="selecionar-item" required>
                  <option value="" disabled selected class="opcao-inicial">
                    Escolha uma opção
                  </option>
                </select>
                <span class="error-mensagem" id="erro-selecionar-iten"></span>
              </div>

              <div class="form-group">
                <label for="quantidade-itens">Quantia</label>
                <input
                  type="number"
                  id="quantidade-itens"
                  placeholder="Ex: 1, 2, 3..."
                  required
                  name="quantidade-itens"
                />
                <span class="error-mensagem" id="erro-quantidade"></span>
              </div>

              <hr class="divisoria" />

              <button type="submit" id="btn-submit-add">Adicionar</button>
            </form>
          </section>
        </div>

        <!-- Tabela de itens adicionados -->
        <section class="sections-app-main sections-app-main-large">
          <div class="table-container">
            <div class="table-head">
              <h2 class="table-head-item">Tabela de preços</h2>
              <div class="table-head-item-bigger">
                <i>Lupa</i>
                <select
                  name="selecionar-categoria-tabela"
                  id="selecionar-categoria-tabela"
                >
                  <option value="">Selecionar Categoria</option>
                </select>
              </div>
            </div>
            <table>
              <thead>
                <tr>
                  <th scope="col">Nome</th>
                  <th scope="col">Medida</th>
                  <th scope="col">Quantia</th>
                  <th scope="col">Valor p/ Medida</th>
                  <th scope="col">Categoria</th>
                  <th scope="col">Subtotal</th>
                  <th scope="col">X</th>
                </tr>
              </thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
          <div class="valor-final">
            <h2 class="text-valor">
              Valor total: <strong id="valor-total">0,00</strong>
            </h2>
            <button>Imprimir</button>
          </div>
        </section>
      </section>

      <!-- SEÇÃO DE MATERIAIS DO APP -->
      <section class="containers-app pagina ativa" id="materiais-page">
        <h1 class="materiais-titulo">Lista de materiais</h1>
        <section
          class="sections-app-main sections-app-main-large"
          id="lista-materiais"
        >
          <div class="card-material">
            <h2 class="card-material-titulo">Madeira</h2>
            <span class="card-material-valor">R$ 10,00</span>
            <button class="card-material-btn">Editar</button>
          </div>
        </section>
      </section>

      <!-- SEÇÃO DE CATEGORIAS DO APP -->
      <section class="containers-app pagina ativa" id="categorias-page">
        <h1 class="materiais-titulo">Lista de categorias</h1>
        <section
          class="sections-app-main sections-app-main-large"
          id="lista-categorias"
        >
          <div class="card-material">
            <h2>Categoria</h2>
            <button onclick="excluirCategoria(indice)">X</button>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
